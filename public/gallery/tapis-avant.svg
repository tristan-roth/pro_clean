<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro tapis en laine, état sale : couleurs ternies, poussière, tache incrustée.
       Remplaçable par une vraie photo : /gallery/tapis-avant.jpg -->
  <defs>
    <filter id="pile" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="4" seed="19" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.5" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.09 0.012" numOctaves="2" seed="6" result="rows"/>
      <feColorMatrix in="rows" type="saturate" values="0" result="rowsG"/>
      <feComponentTransfer in="rowsG" result="rowsA"><feFuncA type="linear" slope="0.25" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="rowsA" mode="soft-light"/>
    </filter>
    <filter id="stain" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="75"/>
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="grime" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.09" numOctaves="4" seed="31" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.32  0 0 0 0 0.3  0 0 0 0 0.26  0 0 0 0.4 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Fond laine ternie -->
  <rect width="800" height="600" fill="#7d6f5c" filter="url(#pile)"/>

  <!-- Bandes tissées aux couleurs éteintes -->
  <g filter="url(#pile)">
    <rect y="70" width="800" height="70" fill="#70544c" opacity="0.8"/>
    <rect y="160" width="800" height="34" fill="#5c6068" opacity="0.75"/>
    <rect y="360" width="800" height="70" fill="#70544c" opacity="0.75"/>
    <rect y="450" width="800" height="34" fill="#5c6068" opacity="0.7"/>
  </g>

  <!-- Rangée de losanges tissés, délavés -->
  <g fill="#8f836c" opacity="0.55">
    <path d="M60 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M170 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M280 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M390 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M500 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M610 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M720 262 l34 34 -34 34 -34 -34 z"/>
  </g>

  <!-- Crasse générale incrustée -->
  <rect width="800" height="600" filter="url(#grime)" opacity="0.55"/>

  <!-- Taches profondes -->
  <g filter="url(#stain)">
    <ellipse cx="330" cy="200" rx="110" ry="75" fill="#3f3527" opacity="0.6"/>
    <ellipse cx="360" cy="215" rx="55" ry="38" fill="#332a1d" opacity="0.65"/>
    <ellipse cx="600" cy="490" rx="90" ry="55" fill="#42382b" opacity="0.55"/>
    <ellipse cx="150" cy="520" rx="60" ry="40" fill="#3a3126" opacity="0.5"/>
  </g>

  <!-- Peluches et débris -->
  <g fill="#cfc4ab" opacity="0.5">
    <circle cx="240" cy="120" r="2.5"/><circle cx="520" cy="95" r="2"/>
    <circle cx="680" cy="240" r="2.4"/><circle cx="430" cy="330" r="1.8"/>
    <circle cx="90" cy="400" r="2.2"/><circle cx="330" cy="560" r="2.6"/>
  </g>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
