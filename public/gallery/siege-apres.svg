<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro tissu de siège auto, après nettoyage : anthracite profond, fibre nette, léger reflet.
       Remplaçable par une vraie photo : /gallery/siege-apres.jpg -->
  <defs>
    <filter id="fabric" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="7" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.3" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.006 0.42" numOctaves="2" seed="11" result="threads"/>
      <feColorMatrix in="threads" type="saturate" values="0" result="threadsG"/>
      <feComponentTransfer in="threadsG" result="threadsA"><feFuncA type="linear" slope="0.25" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="threadsA" mode="soft-light"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfeaf0" stop-opacity="0.16"/>
      <stop offset="35%" stop-color="#dfeaf0" stop-opacity="0.05"/>
      <stop offset="65%" stop-color="#dfeaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="42%" r="78%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.42"/>
    </radialGradient>
  </defs>

  <!-- Base tissu propre — anthracite profond, couleur ravivée -->
  <rect width="800" height="600" fill="#383e46" filter="url(#fabric)"/>

  <!-- Coutures nettes : creux discret + double surpiqûre claire -->
  <g>
    <path d="M170 -20 C 195 160, 185 420, 205 620" stroke="#22262c" stroke-width="9" fill="none" opacity="0.6"/>
    <path d="M160 -20 C 185 160, 175 420, 195 620" stroke="#b9c2cc" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.75"/>
    <path d="M181 -20 C 206 160, 196 420, 216 620" stroke="#b9c2cc" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.75"/>
    <path d="M620 -20 C 600 180, 615 400, 598 620" stroke="#22262c" stroke-width="9" fill="none" opacity="0.55"/>
    <path d="M631 -20 C 611 180, 626 400, 609 620" stroke="#b9c2cc" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.7"/>
  </g>

  <!-- Traces d'aspiration parallèles, à peine visibles — le "peigné" du velours -->
  <g stroke="#465059" stroke-width="26" opacity="0.16">
    <path d="M240 -20 L 260 620" fill="none"/>
    <path d="M330 -20 L 350 620" fill="none"/>
    <path d="M420 -20 L 440 620" fill="none"/>
    <path d="M510 -20 L 530 620" fill="none"/>
  </g>

  <!-- Reflet doux de lampe d'inspection -->
  <rect width="800" height="600" fill="url(#sheen)"/>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
