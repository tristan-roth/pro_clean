<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro tissu de siège auto, état sale : grain terne, taches, poussière.
       Remplaçable par une vraie photo : /gallery/siege-avant.jpg -->
  <defs>
    <filter id="fabric" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="7" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.4" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.006 0.42" numOctaves="2" seed="11" result="threads"/>
      <feColorMatrix in="threads" type="saturate" values="0" result="threadsG"/>
      <feComponentTransfer in="threadsG" result="threadsA"><feFuncA type="linear" slope="0.22" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="threadsA" mode="soft-light"/>
    </filter>
    <filter id="stain" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="70"/>
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="dust" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="4" seed="21" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.5  0 0 0 0 0.42  0 0 0 0.35 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="42%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Base tissu terne, gris-brun encrassé -->
  <rect width="800" height="600" fill="#57524a" filter="url(#fabric)"/>

  <!-- Voile de poussière irrégulier -->
  <rect width="800" height="600" filter="url(#dust)" opacity="0.5"/>

  <!-- Coutures de panneau : creux d'ombre + double surpiqûre -->
  <g>
    <path d="M170 -20 C 195 160, 185 420, 205 620" stroke="#2e2b26" stroke-width="10" fill="none" opacity="0.55"/>
    <path d="M160 -20 C 185 160, 175 420, 195 620" stroke="#8a8378" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.5"/>
    <path d="M181 -20 C 206 160, 196 420, 216 620" stroke="#8a8378" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.5"/>
    <path d="M620 -20 C 600 180, 615 400, 598 620" stroke="#2e2b26" stroke-width="10" fill="none" opacity="0.5"/>
    <path d="M631 -20 C 611 180, 626 400, 609 620" stroke="#8a8378" stroke-width="1.6" fill="none" stroke-dasharray="7 5" opacity="0.45"/>
  </g>

  <!-- Taches : café renversé, auréoles, marque sombre incrustée -->
  <g filter="url(#stain)">
    <ellipse cx="430" cy="240" rx="120" ry="85" fill="#4a3421" opacity="0.55"/>
    <ellipse cx="465" cy="265" rx="60" ry="42" fill="#3a2717" opacity="0.6"/>
    <ellipse cx="300" cy="430" rx="95" ry="60" fill="#42392a" opacity="0.45"/>
    <ellipse cx="640" cy="470" rx="70" ry="55" fill="#35302a" opacity="0.5"/>
  </g>
  <!-- Auréoles séchées (contours seuls) -->
  <g filter="url(#stain)" opacity="0.5">
    <ellipse cx="430" cy="240" rx="135" ry="98" fill="none" stroke="#2f2415" stroke-width="6"/>
    <ellipse cx="300" cy="430" rx="108" ry="72" fill="none" stroke="#2b2418" stroke-width="5"/>
  </g>

  <!-- Miettes / particules -->
  <g fill="#c9bfa8" opacity="0.55">
    <circle cx="215" cy="180" r="2.4"/><circle cx="530" cy="140" r="1.8"/>
    <circle cx="575" cy="345" r="2.2"/><circle cx="380" cy="520" r="2.6"/>
    <circle cx="140" cy="330" r="1.9"/><circle cx="700" cy="220" r="2.1"/>
    <circle cx="480" cy="410" r="1.7"/><circle cx="250" cy="540" r="2.3"/>
  </g>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
