<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro lin de canapé, état sale : beige grisâtre, auréoles, tache de café.
       Remplaçable par une vraie photo : /gallery/canape-avant.jpg -->
  <defs>
    <filter id="linen" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="14" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.32" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.35 0.008" numOctaves="2" seed="3" result="weftH"/>
      <feColorMatrix in="weftH" type="saturate" values="0" result="weftHG"/>
      <feComponentTransfer in="weftHG" result="weftHA"><feFuncA type="linear" slope="0.2" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="weftHA" mode="soft-light" result="g2"/>
      <feTurbulence type="turbulence" baseFrequency="0.008 0.35" numOctaves="2" seed="5" result="weftV"/>
      <feColorMatrix in="weftV" type="saturate" values="0" result="weftVG"/>
      <feComponentTransfer in="weftVG" result="weftVA"><feFuncA type="linear" slope="0.18" intercept="0"/></feComponentTransfer>
      <feBlend in="g2" in2="weftVA" mode="soft-light"/>
    </filter>
    <filter id="stain" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="3" seed="8" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="80"/>
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Base lin encrassé, beige grisâtre -->
  <rect width="800" height="600" fill="#a49780" filter="url(#linen)"/>

  <!-- Passepoil de coussin en biais + surpiqûre -->
  <g>
    <path d="M-20 150 C 240 120, 560 130, 820 105" stroke="#7d715c" stroke-width="12" fill="none" opacity="0.5"/>
    <path d="M-20 162 C 240 132, 560 142, 820 117" stroke="#8d816a" stroke-width="2" fill="none" stroke-dasharray="8 6" opacity="0.55"/>
  </g>

  <!-- Grande auréole séchée -->
  <g filter="url(#stain)">
    <ellipse cx="420" cy="330" rx="185" ry="130" fill="#8a7a5c" opacity="0.5"/>
    <ellipse cx="420" cy="330" rx="200" ry="145" fill="none" stroke="#6e5f42" stroke-width="9" opacity="0.6"/>
  </g>

  <!-- Tache de café fraîche et éclaboussures -->
  <g filter="url(#stain)">
    <ellipse cx="560" cy="430" rx="80" ry="55" fill="#5c452c" opacity="0.65"/>
    <ellipse cx="585" cy="450" rx="38" ry="26" fill="#47331d" opacity="0.7"/>
    <ellipse cx="480" cy="480" rx="16" ry="11" fill="#5c452c" opacity="0.6"/>
    <ellipse cx="650" cy="380" rx="12" ry="9" fill="#5c452c" opacity="0.55"/>
  </g>

  <!-- Zone de frottement lustrée (accoudoir) -->
  <g filter="url(#stain)">
    <ellipse cx="170" cy="450" rx="130" ry="90" fill="#93876e" opacity="0.5"/>
  </g>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
