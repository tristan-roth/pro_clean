<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro lin de canapé, après nettoyage : beige chaud homogène, tissage net.
       Remplaçable par une vraie photo : /gallery/canape-apres.jpg -->
  <defs>
    <filter id="linen" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="14" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.26" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.35 0.008" numOctaves="2" seed="3" result="weftH"/>
      <feColorMatrix in="weftH" type="saturate" values="0" result="weftHG"/>
      <feComponentTransfer in="weftHG" result="weftHA"><feFuncA type="linear" slope="0.22" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="weftHA" mode="soft-light" result="g2"/>
      <feTurbulence type="turbulence" baseFrequency="0.008 0.35" numOctaves="2" seed="5" result="weftV"/>
      <feColorMatrix in="weftV" type="saturate" values="0" result="weftVG"/>
      <feComponentTransfer in="weftVG" result="weftVA"><feFuncA type="linear" slope="0.2" intercept="0"/></feComponentTransfer>
      <feBlend in="g2" in2="weftVA" mode="soft-light"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#fff8ec" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#fff8ec" stop-opacity="0.06"/>
      <stop offset="70%" stop-color="#fff8ec" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="78%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.36"/>
    </radialGradient>
  </defs>

  <!-- Base lin propre — beige chaud, couleur retrouvée -->
  <rect width="800" height="600" fill="#cfc0a2" filter="url(#linen)"/>

  <!-- Passepoil de coussin net + surpiqûre régulière -->
  <g>
    <path d="M-20 150 C 240 120, 560 130, 820 105" stroke="#a8987a" stroke-width="10" fill="none" opacity="0.55"/>
    <path d="M-20 162 C 240 132, 560 142, 820 117" stroke="#efe6d2" stroke-width="2" fill="none" stroke-dasharray="8 6" opacity="0.8"/>
  </g>

  <!-- Fibres redressées : bandes de brossage régulières, très subtiles -->
  <g stroke="#dccfb2" stroke-width="34" opacity="0.2">
    <path d="M-20 250 C 250 240, 550 248, 820 236" fill="none"/>
    <path d="M-20 340 C 250 330, 550 338, 820 326" fill="none"/>
    <path d="M-20 430 C 250 420, 550 428, 820 416" fill="none"/>
    <path d="M-20 520 C 250 510, 550 518, 820 506" fill="none"/>
  </g>

  <!-- Lumière douce rasante -->
  <rect width="800" height="600" fill="url(#sheen)"/>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
