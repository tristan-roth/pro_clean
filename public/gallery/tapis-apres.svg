<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- Macro tapis en laine, après nettoyage : couleurs ravivées, fibres nettes.
       Remplaçable par une vraie photo : /gallery/tapis-apres.jpg -->
  <defs>
    <filter id="pile" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="4" seed="19" stitchTiles="stitch" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0" result="grainG"/>
      <feComponentTransfer in="grainG" result="grainA"><feFuncA type="linear" slope="0.36" intercept="0"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="grainA" mode="multiply" result="g1"/>
      <feTurbulence type="turbulence" baseFrequency="0.09 0.012" numOctaves="2" seed="6" result="rows"/>
      <feColorMatrix in="rows" type="saturate" values="0" result="rowsG"/>
      <feComponentTransfer in="rowsG" result="rowsA"><feFuncA type="linear" slope="0.22" intercept="0"/></feComponentTransfer>
      <feBlend in="g1" in2="rowsA" mode="soft-light"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0%" stop-color="#fff4e4" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#fff4e4" stop-opacity="0.04"/>
      <stop offset="75%" stop-color="#fff4e4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="78%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.38"/>
    </radialGradient>
  </defs>

  <!-- Fond laine ravivée — ocre chaud -->
  <rect width="800" height="600" fill="#a8895c" filter="url(#pile)"/>

  <!-- Bandes tissées aux couleurs profondes retrouvées -->
  <g filter="url(#pile)">
    <rect y="70" width="800" height="70" fill="#8c3f30" opacity="0.9"/>
    <rect y="160" width="800" height="34" fill="#33506e" opacity="0.9"/>
    <rect y="360" width="800" height="70" fill="#8c3f30" opacity="0.85"/>
    <rect y="450" width="800" height="34" fill="#33506e" opacity="0.85"/>
  </g>

  <!-- Rangée de losanges tissés, contrastés -->
  <g fill="#d9c491" opacity="0.85">
    <path d="M60 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M170 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M280 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M390 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M500 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M610 262 l34 34 -34 34 -34 -34 z"/>
    <path d="M720 262 l34 34 -34 34 -34 -34 z"/>
  </g>
  <g fill="#7c2f22" opacity="0.7">
    <path d="M60 279 l17 17 -17 17 -17 -17 z"/>
    <path d="M280 279 l17 17 -17 17 -17 -17 z"/>
    <path d="M500 279 l17 17 -17 17 -17 -17 z"/>
    <path d="M720 279 l17 17 -17 17 -17 -17 z"/>
  </g>

  <!-- Passages d'extraction parallèles, fibres peignées -->
  <g stroke="#b99a6b" stroke-width="30" opacity="0.18">
    <path d="M120 -20 L 100 620" fill="none"/>
    <path d="M300 -20 L 280 620" fill="none"/>
    <path d="M480 -20 L 460 620" fill="none"/>
    <path d="M660 -20 L 640 620" fill="none"/>
  </g>

  <!-- Lumière rasante douce -->
  <rect width="800" height="600" fill="url(#sheen)"/>

  <rect width="800" height="600" fill="url(#vignette)"/>
</svg>
